# Minimal MediaMTX config for the discord-ish screen share.
# Only RTSP (ffmpeg ingest) + WebRTC (browser/plugin playback) — everything else off
# to avoid port clashes. STUN is set for cross-network ICE (add a TURN server here if
# your or your friend's NAT is symmetric/CGNAT and direct P2P fails).
logLevel: info
readTimeout: 30s
writeTimeout: 30s

api: no
metrics: no
pprof: no
playback: no
rtmp: no
hls: no
srt: no

rtsp: yes
rtspTransports: [tcp]
rtspAddress: :8554

webrtc: yes
webrtcAddress: :8889
webrtcLocalUDPAddress: :8189
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302

paths:
  screen:
    source: publisher
